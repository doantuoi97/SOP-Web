<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOP Master List - QA Dashboard</title>
    <!-- Các thư viện cần thiết -->
    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #f8fafc;
        }

        /* Hiệu ứng kính (Glassmorphism) cho thanh tiêu đề cố định */
        .glass-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }

        /* Tùy chỉnh thanh cuộn chuyên nghiệp */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; border: 2px solid #f1f5f9; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Cố định tiêu đề bảng (Sticky Table Header) */
        .sticky-thead th {
            position: sticky;
            top: 0;
            z-index: 10;
            background: #f8fafc; /* Phải trùng với màu nền bảng hoặc dùng trắng */
            box-shadow: inset 0 -1px 0 #e2e8f0; /* Tạo đường kẻ dưới giả */
        }

        /* Hiệu ứng hover cho hàng */
        .table-row-hover:hover {
            background-color: #f1f5f9;
            transform: scale(1.002);
            transition: all 0.2s ease;
        }

        /* Gradient cho các icon stats */
        .icon-gradient-blue { background: linear-gradient(135deg, #60a5fa 0%, #2563eb 100%); }
        .icon-gradient-green { background: linear-gradient(135deg, #34d399 0%, #059669 100%); }
        .icon-gradient-orange { background: linear-gradient(135deg, #fb923c 0%, #ea580c 100%); }
        .icon-gradient-red { background: linear-gradient(135deg, #f87171 0%, #dc2626 100%); }
        .icon-gradient-purple { background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%); }
    </style>
</head>
<body class="text-slate-800 antialiased">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo } = React;

        // --- CẤU HÌNH FIREBASE CỦA TƯƠI ---
        const CUSTOM_FIREBASE_CONFIG = {
          apiKey: "AIzaSyCjVNmkUwyyNTCCTJzdzsGzJ9F2yUwMJ4E",
          authDomain: "sop-master-list.firebaseapp.com",
          projectId: "sop-master-list",
          storageBucket: "sop-master-list.firebasestorage.app",
          messagingSenderId: "613378917384",
          appId: "1:613378917384:web:473be1da0b6c64e2eb7dbd",
          measurementId: "G-QZX1Z1SSTN"
        }; 

        const envConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const activeConfig = CUSTOM_FIREBASE_CONFIG || envConfig;
        const isCloudActive = !!activeConfig;

        let app, auth, db;
        if (isCloudActive) {
            app = initializeApp(activeConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        }

        const getDbCollection = () => {
            if (typeof __firebase_config !== 'undefined' && !CUSTOM_FIREBASE_CONFIG) {
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                return collection(db, 'artifacts', appId, 'public', 'data', 'sops');
            }
            return collection(db, 'qa_sops_cloud');
        };

        const initialData = [
          { id: '1', code: 'SOP-KHO-004', name: 'Quy trình nhận nguyên liệu sản xuất', type: 'SOP', scope: 'GMP', dept: 'Warehouse', version: '1.0', effectiveDate: '2024-01-15', reviewDate: '2026-01-15', status: 'Obsolete', link: '', notes: 'Phiên bản đầu tiên' },
          { id: '2', code: 'SOP-KHO-004', name: 'Quy trình nhận nguyên liệu sản xuất', type: 'SOP', scope: 'GMP', dept: 'Warehouse', version: '2.0', effectiveDate: '2026-02-01', reviewDate: '2028-02-01', status: 'Effective', link: '', notes: 'Cập nhật theo quy định mới' }
        ];

        function App() {
          const [user, setUser] = useState(null);
          const [sops, setSops] = useState([]);
          const [isCloudLoading, setIsCloudLoading] = useState(isCloudActive);
          const [cloudError, setCloudError] = useState('');

          const [searchTerm, setSearchTerm] = useState('');
          const [filters, setFilters] = useState({ type: 'All', scope: 'All', dept: 'All', status: 'All' });
          
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [modalMode, setModalMode] = useState('add'); 
          const [isHistoryModalOpen, setIsHistoryModalOpen] = useState(false);
          const [historyCode, setHistoryCode] = useState('');
          const [isPreviewModalOpen, setIsPreviewModalOpen] = useState(false);
          const [previewData, setPreviewData] = useState(null);
          const [formError, setFormError] = useState('');

          const [currentPage, setCurrentPage] = useState(1);
          const itemsPerPage = 12;

          const emptyForm = { code: '', name: '', type: 'SOP', scope: 'GMP', dept: 'QA', version: '1.0', effectiveDate: '', reviewDate: '', status: 'Draft', link: '', notes: '' };
          const [formData, setFormData] = useState(emptyForm);

          useEffect(() => {
            if (!isCloudActive || user) return;
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token && !CUSTOM_FIREBASE_CONFIG) {
                  await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                  await signInAnonymously(auth);
                }
              } catch (error) { 
                setIsCloudLoading(false);
                setCloudError(`Lỗi xác thực. Kiểm tra lại cấu hình Firebase.`);
              }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, setUser);
            return () => unsubscribe();
          }, [user]);

          useEffect(() => {
            if (!isCloudActive || !user) return;
            const sopsRef = getDbCollection();
            const unsubscribe = onSnapshot(sopsRef, (snapshot) => {
              const data = [];
              snapshot.forEach(doc => { data.push({ id: doc.id, ...doc.data() }); });
              setSops(data);
              setIsCloudLoading(false);
            }, (error) => {
              setIsCloudLoading(false);
              setCloudError(`Lỗi tải dữ liệu. Kiểm tra Rules Firestore.`);
            });
            return () => unsubscribe();
          }, [user]);

          const latestSops = useMemo(() => {
            const grouped = {};
            sops.forEach(sop => {
              if (!grouped[sop.code] || parseFloat(sop.version) > parseFloat(grouped[sop.code].version)) {
                grouped[sop.code] = sop;
              }
            });
            return Object.values(grouped).sort((a, b) => (a.code || '').localeCompare(b.code || ''));
          }, [sops]);

          const stats = useMemo(() => {
            const now = new Date();
            const next30Days = new Date(now.getTime() + 30 * 24 * 60 * 60 * 1000);
            return {
              total: latestSops.length,
              effective: latestSops.filter(s => s.status === 'Effective').length,
              draft: latestSops.filter(s => s.status === 'Draft').length,
              reviewDue: latestSops.filter(s => s.reviewDate && new Date(s.reviewDate) > now && new Date(s.reviewDate) <= next30Days).length,
              expired: latestSops.filter(s => s.reviewDate && new Date(s.reviewDate) < now).length
            };
          }, [latestSops]);

          const filteredSops = useMemo(() => {
            return latestSops.filter(sop => {
              const matchSearch = (sop.code || '').toLowerCase().includes(searchTerm.toLowerCase()) || (sop.name || '').toLowerCase().includes(searchTerm.toLowerCase());
              const matchType = filters.type === 'All' || sop.type === filters.type;
              const matchScope = filters.scope === 'All' || sop.scope === filters.scope;
              const matchDept = filters.dept === 'All' || sop.dept === filters.dept;
              const matchStatus = filters.status === 'All' || sop.status === filters.status;
              return matchSearch && matchType && matchScope && matchDept && matchStatus;
            });
          }, [latestSops, searchTerm, filters]);

          useEffect(() => { setCurrentPage(1); }, [searchTerm, filters]);
          const totalPages = Math.ceil(filteredSops.length / itemsPerPage);
          const indexOfLastItem = currentPage * itemsPerPage;
          const indexOfFirstItem = indexOfLastItem - itemsPerPage;
          const currentSops = filteredSops.slice(indexOfFirstItem, indexOfLastItem);

          const handleSaveSOP = async (e) => {
            e.preventDefault();
            if (!user) return;
            setFormError('');
            try {
              const sopsRef = getDbCollection();
              if (formData.status === 'Effective') {
                sops.forEach(s => {
                  if (s.code === formData.code && s.id !== formData.id) {
                    setDoc(doc(sopsRef, s.id), { ...s, status: 'Obsolete' });
                  }
                });
              }
              const isAddingNew = modalMode === 'add' || modalMode === 'revise';
              if (isAddingNew && sops.some(s => s.code === formData.code && modalMode === 'add')) {
                 setFormError('Mã SOP đã tồn tại! Dùng "Bản mới" để cập nhật.');
                 return;
              }
              const targetId = isAddingNew ? Date.now().toString() : formData.id;
              await setDoc(doc(sopsRef, targetId), { ...formData, id: targetId });
              setIsModalOpen(false);
            } catch (error) { setFormError("Lỗi lưu dữ liệu."); }
          };

          const deleteSOP = async (id) => {
            if (window.confirm('Xác nhận xóa tài liệu này?')) {
              try { await deleteDoc(doc(getDbCollection(), id)); } catch (e) { alert("Lỗi xóa."); }
            }
          };

          const seedInitialData = async () => {
            const sopsRef = getDbCollection();
            await Promise.all(initialData.map(d => setDoc(doc(sopsRef, d.id), d)));
          };

          const openAddModal = () => { setFormData(emptyForm); setModalMode('add'); setFormError(''); setIsModalOpen(true); };
          const openEditModal = (sop) => { setFormData(sop); setModalMode('edit'); setFormError(''); setIsModalOpen(true); };
          const openReviseModal = (sop) => {
            let nextVersion = (Math.floor(parseFloat(sop.version || 1)) + 1).toFixed(1);
            setFormData({ ...sop, id: '', version: nextVersion, status: 'Draft', effectiveDate: '', notes: 'Soát xét v' + sop.version });
            setModalMode('revise'); setFormError(''); setIsModalOpen(true);
          };

          const getReviewStatusColor = (dateString) => {
            if (!dateString) return "text-slate-400";
            const diffDays = Math.ceil((new Date(dateString) - new Date()) / (1000 * 60 * 60 * 24));
            if (diffDays <= 0) return "text-rose-600 font-bold bg-rose-50 px-2 py-0.5 rounded";
            if (diffDays <= 30) return "text-amber-600 font-bold bg-amber-50 px-2 py-0.5 rounded";
            return "text-slate-600";
          };

          // Helper components
          const StatCard = ({ icon, title, value, gradientClass }) => (
            <div className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-4 transition-all hover:shadow-md">
              <div className={`w-12 h-12 rounded-xl flex items-center justify-center text-white text-xl shadow-lg ${gradientClass}`}>
                <i className={icon}></i>
              </div>
              <div>
                <div className="text-2xl font-extrabold text-slate-800 leading-tight">{value}</div>
                <div className="text-xs font-bold text-slate-400 uppercase tracking-tight">{title}</div>
              </div>
            </div>
          );

          const SopCardMobile = ({ sop }) => (
            <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-3">
              <div className="flex justify-between items-start">
                <div>
                  <div className="text-sm font-bold text-blue-600">{sop.code} <span className="text-slate-400 text-xs">v{sop.version}</span></div>
                  <div className="font-bold text-slate-800 leading-tight mt-1">{sop.name}</div>
                </div>
                <span className={`px-2.5 py-1 rounded-full text-[10px] font-bold uppercase ${
                  sop.status === 'Effective' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500'
                }`}>{sop.status}</span>
              </div>
              <div className="flex gap-2">
                <span className="text-[10px] font-bold bg-slate-100 px-2 py-0.5 rounded text-slate-500">{sop.type}</span>
                <span className="text-[10px] font-bold bg-indigo-50 px-2 py-0.5 rounded text-indigo-600">{sop.dept}</span>
              </div>
              <div className="flex justify-between items-center pt-3 border-t border-slate-50 mt-1">
                <div className="text-[11px] text-slate-500">Hạn soát xét: <span className="font-bold text-slate-700">{sop.reviewDate || '-'}</span></div>
                <div className="flex gap-2">
                  <button onClick={() => { setPreviewData(sop); setIsPreviewModalOpen(true); }} className="text-indigo-600 p-2 bg-indigo-50 rounded-lg"><i className="fa-solid fa-eye"></i></button>
                  <button onClick={() => openEditModal(sop)} className="text-emerald-600 p-2 bg-emerald-50 rounded-lg"><i className="fa-solid fa-pen"></i></button>
                </div>
              </div>
            </div>
          );

          return (
            <div className="min-h-screen pb-12">
              
              {/* HEADER & CONTROLS CỐ ĐỊNH PHÍA TRÊN */}
              <div className="sticky top-0 z-40 glass-header px-4 md:px-8 py-4 print:relative print:bg-white print:p-0">
                <div className="max-w-[1600px] mx-auto">
                  <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
                    <div className="flex items-center gap-4">
                        <div className="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-2xl shadow-blue-200 shadow-xl">
                            <i className="fa-solid fa-file-shield"></i>
                        </div>
                        <div>
                            <h1 className="text-2xl font-black text-slate-900 tracking-tight">SOP Master List</h1>
                            <div className="flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-widest">
                                {isCloudLoading ? <><i className="fa-solid fa-circle-notch fa-spin text-blue-500"></i> Đang kết nối...</> : 
                                cloudError ? <span className="text-rose-500"><i className="fa-solid fa-triangle-exclamation"></i> Lỗi Cloud</span> : 
                                <><i className="fa-solid fa-cloud-check text-emerald-500"></i> Real-time Sync</>}
                            </div>
                        </div>
                    </div>
                    <div className="flex flex-wrap gap-2 w-full lg:w-auto print:hidden">
                      <button onClick={() => window.print()} className="flex-1 lg:flex-none flex items-center justify-center gap-2 px-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-50 shadow-sm transition-all active:scale-95">
                        <i className="fa-solid fa-print text-slate-400"></i> Print
                      </button>
                      <button onClick={openAddModal} className="flex-[2] lg:flex-none flex items-center justify-center gap-2 px-6 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-bold shadow-blue-200 shadow-lg hover:bg-blue-700 transition-all active:scale-95">
                        <i className="fa-solid fa-plus"></i> Add New SOP
                      </button>
                    </div>
                  </div>

                  {/* THỐNG KÊ NHANH - CHỈ HIỆN TRÊN MÀN HÌNH LỚN ĐỂ TIẾT KIỆM KHÔNG GIAN CỐ ĐỊNH */}
                  <div className="hidden xl:grid grid-cols-5 gap-4 mt-6">
                    <StatCard icon="fa-solid fa-database" title="Total SOPs" value={stats.total} gradientClass="icon-gradient-blue" />
                    <StatCard icon="fa-solid fa-circle-check" title="Effective" value={stats.effective} gradientClass="icon-gradient-green" />
                    <StatCard icon="fa-solid fa-pen-ruler" title="Drafts" value={stats.draft} gradientClass="icon-gradient-purple" />
                    <StatCard icon="fa-solid fa-hourglass-half" title="Review ≤30d" value={stats.reviewDue} gradientClass="icon-gradient-orange" />
                    <StatCard icon="fa-solid fa-circle-exclamation" title="Expired" value={stats.expired} gradientClass="icon-gradient-red" />
                  </div>

                  {/* THANH CÔNG CỤ TÌM KIẾM & BỘ LỌC */}
                  <div className="mt-6 flex flex-col md:flex-row gap-3">
                    <div className="flex-1 relative">
                      <i className="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                      <input 
                        type="text" 
                        placeholder="Tìm kiếm mã tài liệu, tên quy trình..." 
                        className="w-full pl-11 pr-4 py-3 bg-slate-100/50 border-none rounded-2xl text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none font-medium"
                        value={searchTerm}
                        onChange={(e) => setSearchTerm(e.target.value)}
                      />
                    </div>
                    <div className="flex overflow-x-auto gap-2 pb-1 md:pb-0 no-scrollbar">
                      <select className="px-3 py-2 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-600 outline-none focus:ring-2 focus:ring-blue-500" value={filters.type} onChange={e => setFilters({...filters, type: e.target.value})}>
                        <option value="All">All Types</option><option>SOP</option><option>WI</option><option>FORM</option>
                      </select>
                      <select className="px-3 py-2 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-600 outline-none focus:ring-2 focus:ring-blue-500" value={filters.dept} onChange={e => setFilters({...filters, dept: e.target.value})}>
                        <option value="All">All Depts</option><option>QA</option><option>Warehouse</option><option>Logistics</option><option>Production</option><option>QC</option>
                      </select>
                      <select className="px-3 py-2 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-600 outline-none focus:ring-2 focus:ring-blue-500" value={filters.status} onChange={e => setFilters({...filters, status: e.target.value})}>
                        <option value="All">All Status</option><option>Effective</option><option>Draft</option><option>Obsolete</option>
                      </select>
                    </div>
                  </div>
                </div>
              </div>

              {/* DANH SÁCH DỮ LIỆU */}
              <div className="max-w-[1600px] mx-auto px-4 md:px-8 mt-8">
                
                {/* HIỂN THỊ DẠNG THẺ CHO MOBILE */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 lg:hidden">
                    {currentSops.map(sop => <SopCardMobile key={sop.id} sop={sop} />)}
                    {currentSops.length === 0 && <div className="p-12 text-center text-slate-400 font-bold bg-white rounded-3xl border border-dashed">Không tìm thấy dữ liệu</div>}
                </div>

                {/* HIỂN THỊ DẠNG BẢNG CHO DESKTOP - CÓ STICKY HEADER */}
                <div className="hidden lg:block bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
                  <div className="overflow-x-auto max-h-[calc(100vh-320px)]"> 
                    <table className="w-full text-left border-collapse">
                      <thead className="sticky-thead">
                        <tr className="bg-slate-50/80 text-slate-400 text-[10px] uppercase tracking-[0.15em] font-extrabold border-b border-slate-100">
                          <th className="px-6 py-5">Doc Code</th>
                          <th className="px-6 py-5 min-w-[300px]">Document Name</th>
                          <th className="px-6 py-5 text-center">Type</th>
                          <th className="px-6 py-5">Dept</th>
                          <th className="px-6 py-5 text-center">Ver</th>
                          <th className="px-6 py-5">Effective</th>
                          <th className="px-6 py-5">Review Due</th>
                          <th className="px-6 py-5 text-center">Status</th>
                          <th className="px-6 py-5 text-center print:hidden">Actions</th>
                        </tr>
                      </thead>
                      <tbody className="text-sm divide-y divide-slate-50 font-medium">
                        {currentSops.length > 0 ? currentSops.map(sop => (
                          <tr key={sop.id} className="table-row-hover transition-colors group">
                            <td className="px-6 py-4 font-bold text-blue-600 whitespace-nowrap">{sop.code}</td>
                            <td className="px-6 py-4 text-slate-700 leading-tight font-semibold">{sop.name}</td>
                            <td className="px-6 py-4 text-center">
                              <span className="text-[10px] font-black bg-slate-100 text-slate-500 px-2 py-1 rounded-md">{sop.type}</span>
                            </td>
                            <td className="px-6 py-4">
                                <span className="px-2 py-1 bg-indigo-50 text-indigo-600 rounded-lg text-[11px] font-bold border border-indigo-100">{sop.dept}</span>
                            </td>
                            <td className="px-6 py-4 text-center font-black text-slate-900">v{sop.version}</td>
                            <td className="px-6 py-4 text-slate-500 text-xs">{sop.effectiveDate || '-'}</td>
                            <td className={`px-6 py-4 text-xs ${getReviewStatusColor(sop.reviewDate)}`}>
                              {sop.reviewDate || '-'}
                            </td>
                            <td className="px-6 py-4 text-center">
                              <span className={`inline-flex items-center justify-center px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider ${
                                sop.status === 'Effective' ? 'bg-emerald-50 text-emerald-600 border border-emerald-100' :
                                sop.status === 'Draft' ? 'bg-amber-50 text-amber-600 border border-amber-100' : 'bg-slate-100 text-slate-400'
                              }`}>
                                {sop.status === 'Effective' && <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 mr-1.5 animate-pulse"></span>}
                                {sop.status}
                              </span>
                            </td>
                            <td className="px-6 py-4 text-center whitespace-nowrap print:hidden">
                              <div className="flex items-center justify-center gap-1.5 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button onClick={() => {setPreviewData(sop); setIsPreviewModalOpen(true);}} className="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-xl transition-all"><i className="fa-solid fa-eye"></i></button>
                                <button onClick={() => {setHistoryCode(sop.code); setIsHistoryModalOpen(true);}} className="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all"><i className="fa-solid fa-clock-rotate-left"></i></button>
                                <button onClick={() => openEditModal(sop)} className="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-emerald-600 hover:bg-emerald-50 rounded-xl transition-all"><i className="fa-solid fa-pen"></i></button>
                                <button onClick={() => openReviseModal(sop)} className="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-purple-600 hover:bg-purple-50 rounded-xl transition-all" title="Lên bản mới"><i className="fa-solid fa-copy"></i></button>
                                <button onClick={() => deleteSOP(sop.id)} className="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-xl transition-all"><i className="fa-solid fa-trash-can"></i></button>
                              </div>
                            </td>
                          </tr>
                        )) : (
                          <tr>
                            <td colSpan="9" className="px-6 py-20 text-center">
                              {isCloudLoading ? <div className="animate-pulse flex flex-col items-center gap-2"><i className="fa-solid fa-spinner fa-spin text-3xl text-blue-500"></i><span className="font-bold text-slate-400">Đang tải danh sách...</span></div> : 
                              <div className="flex flex-col items-center opacity-40 gap-4"><i className="fa-solid fa-folder-open text-6xl"></i><div className="font-bold text-lg uppercase tracking-widest">Danh mục trống</div>
                              {searchTerm === '' && <button onClick={seedInitialData} className="px-4 py-2 bg-slate-200 hover:bg-slate-300 rounded-xl text-xs font-bold text-slate-600 uppercase">Khôi phục dữ liệu mẫu</button>}
                              </div>}
                            </td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                  </div>

                  {/* PHÂN TRANG */}
                  <div className="bg-slate-50/50 px-8 py-5 flex items-center justify-between border-t border-slate-100">
                    <div className="text-[11px] font-bold text-slate-400 uppercase tracking-widest">
                      Show <span className="text-slate-900">{Math.min(indexOfLastItem, filteredSops.length)}</span> / <span className="text-slate-900">{filteredSops.length}</span> Records
                    </div>
                    <div className="flex items-center gap-2">
                        <button onClick={() => setCurrentPage(p => Math.max(p-1, 1))} disabled={currentPage===1} className="w-10 h-10 flex items-center justify-center rounded-xl bg-white border border-slate-200 text-slate-400 disabled:opacity-30 hover:text-blue-600 transition-all"><i className="fa-solid fa-chevron-left"></i></button>
                        <div className="px-4 text-sm font-black text-slate-700 uppercase tracking-tighter">Page {currentPage} of {totalPages || 1}</div>
                        <button onClick={() => setCurrentPage(p => Math.min(p+1, totalPages))} disabled={currentPage===totalPages || totalPages === 0} className="w-10 h-10 flex items-center justify-center rounded-xl bg-white border border-slate-200 text-slate-400 disabled:opacity-30 hover:text-blue-600 transition-all"><i className="fa-solid fa-chevron-right"></i></button>
                    </div>
                  </div>
                </div>
              </div>

              {/* MODAL THÊM/SỬA - THIẾT KẾ HIỆN ĐẠI HƠN */}
              {isModalOpen && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex justify-center items-center z-50 p-4">
                  <div className="bg-white w-full max-w-2xl rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col max-h-[90vh] border border-white/20 animate-in zoom-in duration-200">
                    <div className="flex justify-between items-center px-8 py-6 border-b border-slate-100 shrink-0">
                      <h2 className="text-2xl font-black text-slate-900 tracking-tight">
                        {modalMode === 'add' ? 'New Document' : modalMode === 'revise' ? 'New Revision' : 'Update Record'}
                      </h2>
                      <button onClick={() => setIsModalOpen(false)} className="w-10 h-10 flex items-center justify-center bg-slate-100 text-slate-400 rounded-full hover:bg-rose-50 hover:text-rose-500 transition-all"><i className="fa-solid fa-xmark text-xl"></i></button>
                    </div>
                    
                    <form id="sopForm" onSubmit={handleSaveSOP} className="overflow-y-auto p-8 space-y-6">
                      {formError && <div className="p-4 bg-rose-50 border border-rose-100 text-rose-600 rounded-2xl text-xs font-bold flex items-center gap-3"><i className="fa-solid fa-circle-exclamation text-lg"></i> {formError}</div>}
                      
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="space-y-2">
                          <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Doc Code</label>
                          <input required type="text" value={formData.code} onChange={e => setFormData({...formData, code: e.target.value.toUpperCase()})} readOnly={modalMode === 'edit' || modalMode === 'revise'} className="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-bold focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-300" placeholder="E.g. SOP-QA-001"/>
                        </div>
                        <div className="space-y-2">
                          <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Version</label>
                          <input required type="text" value={formData.version} onChange={e => setFormData({...formData, version: e.target.value})} className="w-full bg-blue-50/50 border-none rounded-2xl p-4 text-sm font-black text-blue-700 focus:ring-2 focus:ring-blue-500 outline-none text-center" />
                        </div>
                      </div>
                      
                      <div className="space-y-2">
                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Document Name</label>
                        <input required type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-bold focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Full descriptive name..."/>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="space-y-2">
                          <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Type</label>
                          <select value={formData.type} onChange={e => setFormData({...formData, type: e.target.value})} className="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-bold focus:ring-2 focus:ring-blue-500 outline-none">
                            <option>SOP</option><option>WI</option><option>FORM</option><option>POLICY</option>
                          </select>
                        </div>
                        <div className="space-y-2">
                          <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Department</label>
                          <select value={formData.dept} onChange={e => setFormData({...formData, dept: e.target.value})} className="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-bold focus:ring-2 focus:ring-blue-500 outline-none">
                            <option>QA</option><option>QC</option><option>Warehouse</option><option>Logistics</option><option>Production</option>
                          </select>
                        </div>
                        <div className="space-y-2">
                          <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Status</label>
                          <select value={formData.status} onChange={e => setFormData({...formData, status: e.target.value})} className={`w-full border-none rounded-2xl p-4 text-sm font-black outline-none focus:ring-2 focus:ring-blue-500 ${formData.status === 'Effective' ? 'bg-emerald-50 text-emerald-600' : 'bg-amber-50 text-amber-600'}`}>
                            <option value="Draft">Draft</option><option value="Effective">Effective</option><option value="Obsolete">Obsolete</option>
                          </select>
                        </div>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="space-y-2">
                          <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Effective Date</label>
                          <input type="date" value={formData.effectiveDate} onChange={e => setFormData({...formData, effectiveDate: e.target.value})} className="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-bold focus:ring-2 focus:ring-blue-500 outline-none"/>
                        </div>
                        <div className="space-y-2">
                          <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Review Date</label>
                          <input type="date" value={formData.reviewDate} onChange={e => setFormData({...formData, reviewDate: e.target.value})} className="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-bold focus:ring-2 focus:ring-blue-500 outline-none"/>
                        </div>
                      </div>

                      <div className="space-y-2">
                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Notes / Change Summary</label>
                        <textarea rows="2" value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} className="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none resize-none" placeholder="Reason for change..."></textarea>
                      </div>

                      <div className="space-y-2">
                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Document Link</label>
                        <input type="url" value={formData.link} onChange={e => setFormData({...formData, link: e.target.value})} className="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none" placeholder="URL to Google Drive/Sharepoint..."/>
                      </div>
                    </form>
                    
                    <div className="p-8 bg-slate-50 border-t border-slate-100 flex gap-3 shrink-0">
                      <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 py-4 bg-white border border-slate-200 rounded-2xl text-sm font-black text-slate-500 hover:bg-white transition-all active:scale-95">Cancel</button>
                      <button form="sopForm" type="submit" className="flex-[2] py-4 bg-blue-600 text-white rounded-2xl text-sm font-black shadow-blue-100 shadow-xl hover:bg-blue-700 transition-all active:scale-95">Save Document</button>
                    </div>
                  </div>
                </div>
              )}

              {/* MODAL PREVIEW & HISTORY GIỮ NGUYÊN LOGIC, CẬP NHẬT UI BO GÓC */}
              {/* ... Logic Preview & History tương tự như Add Modal về mặt thẩm mỹ ... */}
              {isPreviewModalOpen && previewData && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex justify-center items-center z-50 p-4">
                  <div className="bg-white w-full max-w-5xl h-[90vh] rounded-[3rem] shadow-2xl overflow-hidden flex flex-col border border-white/20">
                    <div className="flex justify-between items-center px-8 py-6 border-b border-slate-100 shrink-0">
                      <div className="flex items-center gap-4">
                        <div className="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-xl shadow-indigo-100 shadow-xl"><i className="fa-solid fa-file-lines"></i></div>
                        <div>
                            <h2 className="text-xl font-black text-slate-900 leading-tight">{previewData.code}</h2>
                            <div className="text-xs font-bold text-indigo-500 uppercase tracking-widest">Version {previewData.version}</div>
                        </div>
                      </div>
                      <button onClick={() => setIsPreviewModalOpen(false)} className="w-10 h-10 flex items-center justify-center bg-slate-100 text-slate-400 rounded-full hover:bg-rose-50 hover:text-rose-500 transition-all"><i className="fa-solid fa-xmark text-xl"></i></button>
                    </div>
                    <div className="flex-1 overflow-hidden flex flex-col md:flex-row bg-slate-50">
                        <div className="w-full md:w-80 bg-white p-8 overflow-y-auto border-r border-slate-100 space-y-6">
                            <div><div className="text-[10px] font-black text-slate-400 uppercase mb-1">Title</div><div className="font-bold text-slate-800 leading-tight">{previewData.name}</div></div>
                            <div className="grid grid-cols-2 gap-4">
                                <div><div className="text-[10px] font-black text-slate-400 uppercase mb-1">Type</div><div className="text-xs font-bold text-slate-700 bg-slate-100 px-2 py-1 rounded inline-block">{previewData.type}</div></div>
                                <div><div className="text-[10px] font-black text-slate-400 uppercase mb-1">Dept</div><div className="text-xs font-bold text-slate-700">{previewData.dept}</div></div>
                            </div>
                            <div><div className="text-[10px] font-black text-slate-400 uppercase mb-1">Summary</div><div className="text-xs text-slate-500 italic bg-amber-50 p-4 rounded-2xl border border-amber-100/50">{previewData.notes || 'No notes available.'}</div></div>
                        </div>
                        <div className="flex-1 p-4 flex flex-col">
                            {previewData.link ? (
                                <iframe src={previewData.link.replace('/edit', '/preview').replace('/view', '/preview')} className="w-full h-full rounded-2xl border border-slate-200 shadow-inner bg-white" title="Doc Preview"></iframe>
                            ) : (
                                <div className="w-full h-full flex flex-col items-center justify-center opacity-30 text-center gap-4">
                                    <i className="fa-solid fa-link-slash text-6xl"></i>
                                    <div className="font-bold uppercase tracking-widest">No Link Provided</div>
                                </div>
                            )}
                        </div>
                    </div>
                  </div>
                </div>
              )}

              {/* LỊCH SỬ PHIÊN BẢN */}
              {isHistoryModalOpen && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex justify-center items-center z-50 p-4">
                  <div className="bg-white w-full max-w-4xl rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col max-h-[80vh]">
                    <div className="px-8 py-6 border-b border-slate-100 flex justify-between items-center">
                        <h2 className="text-xl font-black text-slate-900 tracking-tight">Revision History: {historyCode}</h2>
                        <button onClick={() => setIsHistoryModalOpen(false)} className="w-10 h-10 flex items-center justify-center bg-slate-100 text-slate-400 rounded-full hover:bg-rose-50 hover:text-rose-500 transition-all"><i className="fa-solid fa-xmark text-xl"></i></button>
                    </div>
                    <div className="flex-1 overflow-y-auto px-8 py-4">
                        <table className="w-full text-left">
                            <thead className="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                <tr><th className="py-4">Ver</th><th>Status</th><th>Effective</th><th>Notes</th></tr>
                            </thead>
                            <tbody className="text-sm divide-y divide-slate-50 font-semibold">
                                {sops.filter(s => s.code === historyCode).sort((a,b) => parseFloat(b.version) - parseFloat(a.version)).map(v => (
                                    <tr key={v.id} className="hover:bg-slate-50/50">
                                        <td className="py-4 font-black">v{v.version}</td>
                                        <td><span className={`px-2 py-0.5 rounded-full text-[10px] font-black ${v.status==='Effective'?'bg-emerald-100 text-emerald-700':'bg-slate-100 text-slate-400'}`}>{v.status}</span></td>
                                        <td className="text-slate-400">{v.effectiveDate}</td>
                                        <td className="text-slate-500 text-xs italic">{v.notes}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                  </div>
                </div>
              )}

            </div>
          );
        }
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
