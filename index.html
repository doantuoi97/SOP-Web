<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOP Master List - QA Dashboard</title>
    <!-- Thư viện React & Tailwind -->
    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Cấu hình Tailwind Custom Colors, Fonts & Dark Mode -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                    },
                    colors: {
                        brand: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 900: '#312e81' }
                    }
                }
            }
        }
    </script>
    
    <!-- Google Font Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
        ::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }
        
        .dark ::-webkit-scrollbar-thumb { background-color: #475569; border: 2px solid transparent; background-clip: padding-box; }
        .dark ::-webkit-scrollbar-thumb:hover { background-color: #64748b; }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95) translateY(-10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-modal { animation: modalFadeIn 0.2s ease-out forwards; }
        
        .table-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); }
        .dark .table-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -1px rgba(0, 0, 0, 0.3); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 antialiased selection:bg-brand-200 selection:text-brand-900 transition-colors duration-200">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        // Import thêm các hàm đăng nhập bằng Email/Password
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

        const { useState, useEffect, useMemo } = React;

        const CUSTOM_FIREBASE_CONFIG = {
          apiKey: "AIzaSyCjVNmkUwyyNTCCTJzdzsGzJ9F2yUwMJ4E",
          authDomain: "sop-master-list.firebaseapp.com",
          projectId: "sop-master-list",
          storageBucket: "sop-master-list.firebasestorage.app",
          messagingSenderId: "613378917384",
          appId: "1:613378917384:web:473be1da0b6c64e2eb7dbd",
          measurementId: "G-QZX1Z1SSTN"
        };

        const envConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const activeConfig = CUSTOM_FIREBASE_CONFIG || envConfig;
        const isCloudActive = !!activeConfig;

        let app, auth, db, storage;
        if (isCloudActive) {
            app = initializeApp(activeConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            storage = getStorage(app);
        }

        const getDbCollection = () => {
            if (typeof __firebase_config !== 'undefined' && !CUSTOM_FIREBASE_CONFIG) {
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                return collection(db, 'artifacts', appId, 'public', 'data', 'sops');
            }
            return collection(db, 'qa_sops_cloud_v2'); 
        };

        const initialData = [
          { id: '1', code: 'SOP-KHO-004', name: 'Quy trình nhận nguyên liệu sản xuất', type: 'SOP', scope: 'GMP', dept: 'Warehouse', version: '1.0', effectiveDate: '2024-01-15', reviewDate: '2026-01-15', status: 'Obsolete', link: '', notes: 'Phiên bản đầu tiên' },
          { id: '2', code: 'SOP-KHO-004', name: 'Quy trình nhận nguyên liệu sản xuất', type: 'SOP', scope: 'GMP', dept: 'Warehouse', version: '2.0', effectiveDate: '2026-02-01', reviewDate: '2028-02-01', status: 'Effective', link: '', notes: 'Cập nhật theo quy định mới' }
        ];

        function App() {
          const [isDarkMode, setIsDarkMode] = useState(() => {
            const savedTheme = localStorage.getItem('qa_dashboard_theme');
            if (savedTheme) return savedTheme === 'dark';
            return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          });

          useEffect(() => {
            if (isDarkMode) {
              document.documentElement.classList.add('dark');
              localStorage.setItem('qa_dashboard_theme', 'dark');
            } else {
              document.documentElement.classList.remove('dark');
              localStorage.setItem('qa_dashboard_theme', 'light');
            }
          }, [isDarkMode]);

          const toggleDarkMode = () => setIsDarkMode(prev => !prev);

          // --- STATE CHÍNH ---
          const [user, setUser] = useState(null);
          // Xác định xem người dùng hiện tại có phải là Admin hay không
          // Nếu không dùng Cloud (Offline) thì auto là Admin. Nếu dùng Cloud, phải là user đăng nhập bằng Email (!user.isAnonymous)
          const isAdmin = !isCloudActive || (user && !user.isAnonymous);

          // States Đăng nhập
          const [showLoginModal, setShowLoginModal] = useState(false);
          const [loginEmail, setLoginEmail] = useState('');
          const [loginPassword, setLoginPassword] = useState('');
          const [loginError, setLoginError] = useState('');

          const [sops, setSops] = useState(() => {
            const saved = localStorage.getItem('qa_sop_master_list');
            return saved ? JSON.parse(saved) : initialData;
          });
          const [isCloudLoading, setIsCloudLoading] = useState(isCloudActive);
          const [searchTerm, setSearchTerm] = useState('');
          const [filters, setFilters] = useState({ type: 'All', scope: 'All', dept: 'All', status: 'All' });
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [modalMode, setModalMode] = useState('add'); 
          const [isHistoryModalOpen, setIsHistoryModalOpen] = useState(false);
          const [historyCode, setHistoryCode] = useState('');
          const [isPreviewModalOpen, setIsPreviewModalOpen] = useState(false);
          const [previewData, setPreviewData] = useState(null);
          const [formError, setFormError] = useState('');
          const [currentPage, setCurrentPage] = useState(1);
          
          const [uploading, setUploading] = useState(false);
          const [uploadProgress, setUploadProgress] = useState(0);
          const [fileInputKey, setFileInputKey] = useState(Date.now());

          const itemsPerPage = 10;
          const emptyForm = { code: '', name: '', type: 'SOP', scope: 'GMP', dept: 'QA', version: '1.0', effectiveDate: '', reviewDate: '', status: 'Draft', link: '', notes: '' };
          const [formData, setFormData] = useState(emptyForm);

          useEffect(() => {
            if (!isCloudActive) localStorage.setItem('qa_sop_master_list', JSON.stringify(sops));
          }, [sops]);

          useEffect(() => {
            if (!isCloudActive) return;
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token && !CUSTOM_FIREBASE_CONFIG) {
                  await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                  // Mặc định đăng nhập Ẩn danh (Chỉ xem)
                  await signInAnonymously(auth);
                }
              } catch (error) { console.error("Lỗi xác thực:", error); }
            };
            
            // Chỉ chạy initAuth nếu chưa có user nào được lưu trong phiên
            auth.onAuthStateChanged((currentUser) => {
                if (!currentUser) {
                    initAuth();
                } else {
                    setUser(currentUser);
                }
            });
          }, []);

          useEffect(() => {
            if (!isCloudActive || !user) return;
            const sopsRef = getDbCollection();
            const unsubscribe = onSnapshot(sopsRef, (snapshot) => {
              const data = [];
              snapshot.forEach(doc => { data.push({ id: doc.id, ...doc.data() }); });
              setSops(data);
              setIsCloudLoading(false);
            }, (error) => { setIsCloudLoading(false); });
            return () => unsubscribe();
          }, [user]);

          // --- XỬ LÝ ĐĂNG NHẬP / ĐĂNG XUẤT ---
          const handleLogin = async (e) => {
              e.preventDefault();
              setLoginError('');
              try {
                  await signInWithEmailAndPassword(auth, loginEmail, loginPassword);
                  setShowLoginModal(false);
                  setLoginEmail('');
                  setLoginPassword('');
              } catch (error) {
                  console.error(error);
                  setLoginError('Đăng nhập thất bại. Sai email, mật khẩu hoặc tài khoản chưa được tạo trên Firebase.');
              }
          };

          const handleLogout = async () => {
              try {
                  await signOut(auth);
                  // Sau khi đăng xuất Admin, tự động đăng nhập ẩn danh lại để tiếp tục xem được dữ liệu
                  await signInAnonymously(auth);
              } catch (error) {
                  console.error("Lỗi đăng xuất", error);
              }
          };

          const latestSops = useMemo(() => {
            const grouped = {};
            sops.forEach(sop => {
              if (!grouped[sop.code]) grouped[sop.code] = sop;
              else if (parseFloat(sop.version) > parseFloat(grouped[sop.code].version)) grouped[sop.code] = sop;
            });
            return Object.values(grouped);
          }, [sops]);

          const stats = useMemo(() => {
            const now = new Date();
            const next30Days = new Date(now.getTime() + 30 * 24 * 60 * 60 * 1000);
            let gmpCount = 0; let gdpCount = 0; let gspCount = 0;
            latestSops.forEach(s => {
              if (s.scope && s.scope.includes('GMP')) gmpCount++;
              if (s.scope && s.scope.includes('GDP')) gdpCount++;
              if (s.scope && s.scope.includes('GSP')) gspCount++;
            });
            return {
              total: latestSops.length,
              effective: latestSops.filter(s => s.status === 'Effective').length,
              draft: latestSops.filter(s => s.status === 'Draft').length,
              obsolete: latestSops.filter(s => s.status === 'Obsolete').length,
              gmp: gmpCount, gdp: gdpCount, gsp: gspCount,
              reviewDue: latestSops.filter(s => s.reviewDate && new Date(s.reviewDate) > now && new Date(s.reviewDate) <= next30Days).length,
              expired: latestSops.filter(s => s.reviewDate && new Date(s.reviewDate) < now).length
            };
          }, [latestSops]);

          const filteredSops = useMemo(() => {
            let result = latestSops.filter(sop => {
              const matchSearch = sop.code.toLowerCase().includes(searchTerm.toLowerCase()) || sop.name.toLowerCase().includes(searchTerm.toLowerCase());
              return matchSearch && 
                     (filters.type === 'All' || sop.type === filters.type) && 
                     (filters.scope === 'All' || sop.scope === filters.scope) && 
                     (filters.dept === 'All' || sop.dept === filters.dept) && 
                     (filters.status === 'All' || sop.status === filters.status);
            });
            
            result.sort((a, b) => {
              return a.code.localeCompare(b.code, undefined, { numeric: true, sensitivity: 'base' });
            });

            return result;
          }, [latestSops, searchTerm, filters]);

          useEffect(() => { setCurrentPage(1); }, [searchTerm, filters]);

          const totalPages = Math.ceil(filteredSops.length / itemsPerPage);
          const indexOfLastItem = currentPage * itemsPerPage;
          const indexOfFirstItem = indexOfLastItem - itemsPerPage;
          const currentSops = filteredSops.slice(indexOfFirstItem, indexOfLastItem);

          const handleSaveSOP = async (e) => {
            e.preventDefault();
            if (!isAdmin) return; // Chặn lưu nếu không phải admin

            setFormError('');
            let newSops = [...sops];
            if (formData.status === 'Effective') {
              newSops = newSops.map(s => (s.code === formData.code && s.id !== formData.id) ? { ...s, status: 'Obsolete' } : s);
            }
            const isAddingNew = modalMode === 'add' || modalMode === 'revise';
            if (isAddingNew && sops.some(s => s.code === formData.code && s.version === formData.version)) {
               setFormError(`Phiên bản v${formData.version} của mã ${formData.code} đã tồn tại!`);
               return;
            }

            if (isCloudActive && user) {
                try {
                    const sopsRef = getDbCollection();
                    if (formData.status === 'Effective') {
                        sops.forEach(s => {
                            if (s.code === formData.code && s.id !== formData.id) setDoc(doc(sopsRef, s.id), { ...s, status: 'Obsolete' });
                        });
                    }
                    if (isAddingNew) {
                        const newId = Date.now().toString();
                        await setDoc(doc(sopsRef, newId), { ...formData, id: newId });
                    } else await setDoc(doc(sopsRef, formData.id), formData);
                    setIsModalOpen(false);
                } catch (error) { 
                    console.error(error);
                    setFormError("Lỗi kết nối Cloud. Hãy kiểm tra lại Rule Firestore xem tài khoản của bạn đã được cấp quyền Write chưa."); 
                }
            } else {
                let finalSops = isAddingNew ? [...newSops, { ...formData, id: Date.now().toString() }] : newSops.map(s => s.id === formData.id ? formData : s);
                setSops(finalSops);
                setIsModalOpen(false);
            }
          };

          const deleteSOP = async (id) => {
            if (!isAdmin) return;
            if (window.confirm('Bạn có chắc chắn muốn xóa bản ghi này? Hành động này không thể hoàn tác.')) {
              if (isCloudActive && user) {
                  try { await deleteDoc(doc(getDbCollection(), id)); } catch (error) { alert("Lỗi xóa Cloud. Kiểm tra quyền Admin."); }
              } else setSops(sops.filter(s => s.id !== id));
            }
          };

          const seedInitialData = async () => {
            if (!isAdmin) return;
            if (isCloudActive && user) {
                setIsCloudLoading(true);
                const sopsRef = getDbCollection();
                try { await Promise.all(initialData.map(data => setDoc(doc(sopsRef, data.id), data))); } catch (error) {}
                setIsCloudLoading(false);
            } else setSops(initialData);
          };

          const handleFileUpload = async (e) => {
            if (!isAdmin) return;
            const file = e.target.files[0];
            if (!file) return;
            
            if (!isCloudActive || !storage) {
                setFormError("Tính năng upload chỉ hoạt động khi bạn đã kết nối Firebase Đám mây.");
                return;
            }

            const fileExtension = file.name.split('.').pop();
            const fileName = `sops/${Date.now()}_${formData.code || 'doc'}.${fileExtension}`;
            const storageRef = ref(storage, fileName);
            const uploadTask = uploadBytesResumable(storageRef, file);

            setUploading(true);
            setUploadProgress(0);
            setFormError('');

            uploadTask.on('state_changed', 
                (snapshot) => {
                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    setUploadProgress(progress);
                }, 
                (error) => {
                    console.error("Lỗi tải file:", error);
                    setFormError("Lỗi khi tải file lên: (Chắc chắn Storage Rules cho phép write) " + error.message);
                    setUploading(false);
                    setFileInputKey(Date.now()); 
                }, 
                async () => {
                    const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
                    setFormData({...formData, link: downloadURL});
                    setUploading(false);
                    setFileInputKey(Date.now()); 
                }
            );
          };

          const openAddModal = () => { if(isAdmin) { setFormData(emptyForm); setModalMode('add'); setFormError(''); setIsModalOpen(true); } };
          const openEditModal = (sop) => { if(isAdmin) { setFormData(sop); setModalMode('edit'); setFormError(''); setIsModalOpen(true); } };
          const openReviseModal = (sop) => {
            if(!isAdmin) return;
            let nextVer = '1.0';
            if (!isNaN(parseFloat(sop.version))) nextVer = (Math.floor(parseFloat(sop.version)) + 1).toFixed(1);
            setFormData({ ...sop, id: '', version: nextVer, status: 'Draft', effectiveDate: '', reviewDate: '', notes: 'Soát xét từ v' + sop.version });
            setModalMode('revise'); setFormError(''); setIsModalOpen(true);
          };
          const openPreviewModal = (sop) => { setPreviewData(sop); setIsPreviewModalOpen(true); };

          const exportCSV = () => {
            const headers = ['Doc Code', 'Document Name', 'Type', 'Scope', 'Department', 'Version', 'Effective Date', 'Review Due', 'Status', 'Notes', 'Link'];
            const rows = filteredSops.map(s => [s.code, `"${s.name}"`, s.type, s.scope, s.dept, s.version, s.effectiveDate, s.reviewDate, s.status, `"${s.notes}"`, s.link]);
            const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + [headers.join(','), ...rows.map(e => e.join(','))].join("\n");
            const link = document.createElement("a"); link.href = encodeURI(csvContent); link.download = `SOP_Master_List_${new Date().toISOString().split('T')[0]}.csv`; link.click();
          };

          const getEmbedLink = (url) => {
            if (!url) return null;
            if ((url.includes('docs.google.com') || url.includes('drive.google.com')) && (url.includes('/edit') || url.includes('/view'))) {
                return url.replace(/\/(edit|view).*$/, '/preview');
            }
            return url;
          };

          const isGoogleDriveLink = (url) => {
              return url && (url.includes('drive.google.com') || url.includes('docs.google.com'));
          };

          // --- UI COMPONENTS ---
          const StatCard = ({ icon, title, value, colorType }) => {
            const colors = {
                brand: "text-brand-600 bg-brand-50 border-brand-100 ring-brand-600/10 dark:bg-brand-900/30 dark:border-brand-800/50 dark:text-brand-400 dark:ring-brand-500/20",
                emerald: "text-emerald-600 bg-emerald-50 border-emerald-100 ring-emerald-600/10 dark:bg-emerald-900/30 dark:border-emerald-800/50 dark:text-emerald-400 dark:ring-emerald-500/20",
                amber: "text-amber-600 bg-amber-50 border-amber-100 ring-amber-600/10 dark:bg-amber-900/30 dark:border-amber-800/50 dark:text-amber-400 dark:ring-amber-500/20",
                slate: "text-slate-600 bg-slate-50 border-slate-200 ring-slate-600/10 dark:bg-slate-800 dark:border-slate-700 dark:text-slate-400 dark:ring-slate-500/20",
                rose: "text-rose-600 bg-rose-50 border-rose-100 ring-rose-600/10 dark:bg-rose-900/30 dark:border-rose-800/50 dark:text-rose-400 dark:ring-rose-500/20",
                teal: "text-teal-600 bg-teal-50 border-teal-100 ring-teal-600/10 dark:bg-teal-900/30 dark:border-teal-800/50 dark:text-teal-400 dark:ring-teal-500/20",
            };
            const theme = colors[colorType] || colors.slate;
            return (
              <div className="bg-white dark:bg-slate-800 p-5 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm flex items-center gap-4 transition-all hover:shadow-md hover:-translate-y-0.5 group print:hidden">
                <div className={`w-12 h-12 rounded-xl flex items-center justify-center text-xl shadow-sm ring-1 ring-inset transition-colors ${theme}`}>
                  <i className={icon}></i>
                </div>
                <div>
                  <div className="text-sm font-semibold text-slate-500 dark:text-slate-400 mb-0.5">{title}</div>
                  <div className="text-2xl font-bold text-slate-800 dark:text-slate-100 tracking-tight">{value}</div>
                </div>
              </div>
            );
          };

          const Badge = ({ children, type }) => {
            const styles = {
              'Effective': 'bg-emerald-50 text-emerald-700 ring-emerald-600/20 dark:bg-emerald-900/40 dark:text-emerald-400 dark:ring-emerald-500/30',
              'Draft': 'bg-amber-50 text-amber-700 ring-amber-600/20 dark:bg-amber-900/40 dark:text-amber-400 dark:ring-amber-500/30',
              'Obsolete': 'bg-slate-100 text-slate-600 ring-slate-500/10 dark:bg-slate-800 dark:text-slate-400 dark:ring-slate-500/30',
              'GMP': 'bg-indigo-50 text-indigo-700 ring-indigo-600/20 dark:bg-indigo-900/40 dark:text-indigo-400 dark:ring-indigo-500/30',
              'GDP': 'bg-teal-50 text-teal-700 ring-teal-600/20 dark:bg-teal-900/40 dark:text-teal-400 dark:ring-teal-500/30',
              'GSP': 'bg-purple-50 text-purple-700 ring-purple-600/20 dark:bg-purple-900/40 dark:text-purple-400 dark:ring-purple-500/30',
              'GMP+GSP+GDP': 'bg-rose-50 text-rose-700 ring-rose-600/20 dark:bg-rose-900/40 dark:text-rose-400 dark:ring-rose-500/30',
              'Type': 'bg-slate-50 text-slate-600 ring-slate-500/10 border border-slate-200 dark:bg-slate-800 dark:text-slate-300 dark:border-slate-700 dark:ring-slate-600/30'
            };
            const style = styles[type] || styles['Type'];
            return (
              <span className={`inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold ring-1 ring-inset ${style}`}>
                {type === 'Effective' && <svg className="h-1.5 w-1.5 fill-emerald-500 dark:fill-emerald-400 mr-1.5" viewBox="0 0 6 6" aria-hidden="true"><circle cx="3" cy="3" r="3" /></svg>}
                {children}
              </span>
            );
          };

          const getReviewStatusColor = (dateString) => {
            if (!dateString) return "text-slate-400 dark:text-slate-500";
            const diffDays = Math.ceil((new Date(dateString) - new Date()) / (1000 * 60 * 60 * 24));
            if (diffDays <= 0) return "text-rose-600 dark:text-rose-500 font-bold flex items-center gap-1.5";
            if (diffDays <= 30) return "text-amber-600 dark:text-amber-500 font-bold flex items-center gap-1.5";
            return "text-slate-600 dark:text-slate-300";
          };

          return (
            <div className="min-h-screen pb-10 transition-colors duration-200">
              {/* --- HEADER KHU VỰC ĐIỀU HƯỚNG --- */}
              <header className="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 sticky top-0 z-40 shadow-sm print:hidden transition-colors duration-200">
                <div className="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex justify-between items-center h-16">
                    <div className="flex items-center gap-3">
                      <div className="w-10 h-10 bg-brand-600 dark:bg-brand-500 rounded-xl flex items-center justify-center text-white shadow-sm shadow-brand-500/30">
                        <i className="fa-solid fa-layer-group text-lg"></i>
                      </div>
                      <div>
                        <h1 className="text-xl font-bold text-slate-900 dark:text-white tracking-tight leading-tight">QA Document Control</h1>
                        <div className="flex items-center text-xs font-medium mt-0.5">
                          {isCloudActive ? (
                              <span className="flex items-center text-emerald-600 dark:text-emerald-400 gap-1.5">
                                  <span className="relative flex h-2 w-2"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 dark:bg-emerald-300 opacity-75"></span><span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500 dark:bg-emerald-400"></span></span>
                                  {isCloudLoading ? 'Đang đồng bộ...' : 'Cloud Synced'}
                              </span>
                          ) : (
                              <span className="text-slate-500 dark:text-slate-400 flex items-center gap-1.5"><i className="fa-solid fa-hard-drive"></i> Offline Local</span>
                          )}
                        </div>
                      </div>
                    </div>
                    
                    <div className="flex items-center gap-3">
                      <button onClick={toggleDarkMode} className="p-2 text-slate-500 dark:text-slate-400 hover:text-amber-500 dark:hover:text-amber-400 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition-colors focus:outline-none" title={isDarkMode ? "Switch to Light Mode" : "Switch to Dark Mode"}>
                        {isDarkMode ? <i className="fa-solid fa-sun text-lg"></i> : <i className="fa-solid fa-moon text-lg"></i>}
                      </button>

                      <div className="h-6 w-px bg-slate-300 dark:bg-slate-600 mx-1"></div>

                      {/* --- NÚT ĐĂNG NHẬP / ĐĂNG XUẤT --- */}
                      {isAdmin ? (
                        <div className="flex items-center gap-3">
                            <span className="text-sm font-semibold text-brand-700 dark:text-brand-400 hidden md:inline-block"><i className="fa-solid fa-user-shield mr-1"></i> Quản trị viên</span>
                            <button onClick={handleLogout} className="px-3.5 py-2 text-sm font-semibold text-rose-600 dark:text-rose-400 bg-rose-50 dark:bg-rose-900/30 hover:bg-rose-100 dark:hover:bg-rose-900/60 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-rose-500">
                                Đăng xuất
                            </button>
                        </div>
                      ) : (
                        <button onClick={() => setShowLoginModal(true)} className="flex items-center gap-2 px-3.5 py-2 text-sm font-semibold text-slate-700 dark:text-slate-200 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-brand-500">
                            <i className="fa-solid fa-lock text-slate-400 dark:text-slate-400"></i> <span className="hidden sm:inline">Đăng nhập</span>
                        </button>
                      )}

                      <button onClick={exportCSV} className="hidden lg:flex items-center gap-2 px-3.5 py-2 text-sm font-semibold text-slate-700 dark:text-slate-200 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-600 transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-1 dark:focus:ring-offset-slate-800">
                        <i className="fa-solid fa-file-csv text-slate-400 dark:text-slate-300"></i> Export
                      </button>
                      
                      {isAdmin && (
                          <button onClick={openAddModal} className="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-white bg-brand-600 dark:bg-brand-500 rounded-lg hover:bg-brand-700 dark:hover:bg-brand-600 shadow-sm shadow-brand-500/30 transition-colors focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2 dark:focus:ring-offset-slate-800">
                            <i className="fa-solid fa-plus"></i> <span className="hidden sm:inline">Add Document</span><span className="sm:hidden">Add</span>
                          </button>
                      )}
                    </div>
                  </div>
                </div>
              </header>

              <main className="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 mt-8">
                
                {/* --- THỐNG KÊ (STATS DASHBOARD) --- */}
                <div className="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-4 mb-6">
                  <StatCard icon="fa-regular fa-file-lines" title="Total Documents" value={stats.total} colorType="brand" />
                  <StatCard icon="fa-solid fa-check-double" title="Effective SOPs" value={stats.effective} colorType="emerald" />
                  <StatCard icon="fa-solid fa-pen-ruler" title="Draft / Review" value={stats.draft} colorType="amber" />
                  <StatCard icon="fa-solid fa-industry" title="GMP Documents" value={stats.gmp} colorType="slate" />
                  <StatCard icon="fa-solid fa-bell" title="Review ≤ 30 Days" value={stats.reviewDue} colorType="amber" />
                  <StatCard icon="fa-solid fa-triangle-exclamation" title="Overdue / Expired" value={stats.expired} colorType="rose" />
                </div>

                {/* --- THANH CÔNG CỤ (TOOLBAR) - STICKY --- */}
                <div className="sticky top-[64px] z-30 pt-2 pb-6 bg-slate-50 dark:bg-slate-900 transition-colors duration-200 print:hidden">
                  <div className="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm flex flex-col lg:flex-row gap-4 justify-between items-center transition-colors duration-200">
                    <div className="w-full lg:w-1/3 relative">
                      <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i className="fa-solid fa-magnifying-glass text-slate-400 dark:text-slate-500"></i>
                      </div>
                      <input 
                        type="text" 
                        placeholder="Tìm kiếm mã hoặc tên tài liệu..." 
                        className="block w-full pl-10 pr-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg leading-5 bg-white dark:bg-slate-900 placeholder-slate-400 dark:placeholder-slate-500 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 sm:text-sm transition-shadow"
                        value={searchTerm}
                        onChange={(e) => setSearchTerm(e.target.value)}
                      />
                    </div>
                    
                    <div className="w-full lg:w-auto flex flex-wrap gap-3">
                      <select className="pl-3 pr-8 py-2 border border-slate-300 dark:border-slate-600 rounded-lg text-sm bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500" value={filters.type} onChange={e => setFilters({...filters, type: e.target.value})}>
                        <option value="All">All Types</option><option>SOP</option><option>WI</option><option>FORM</option><option>POLICY</option>
                      </select>
                      <select className="pl-3 pr-8 py-2 border border-slate-300 dark:border-slate-600 rounded-lg text-sm bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500" value={filters.scope} onChange={e => setFilters({...filters, scope: e.target.value})}>
                        <option value="All">All Scopes</option><option>GMP</option><option>GDP</option><option>GSP</option><option>GMP+GSP+GDP</option>
                      </select>
                      <select className="pl-3 pr-8 py-2 border border-slate-300 dark:border-slate-600 rounded-lg text-sm bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500" value={filters.dept} onChange={e => setFilters({...filters, dept: e.target.value})}>
                        <option value="All">All Depts</option><option>QA</option><option>QC</option><option>Warehouse</option><option>Logistics</option><option>Production</option>
                      </select>
                      <select className="pl-3 pr-8 py-2 border border-slate-300 dark:border-slate-600 rounded-lg text-sm bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500" value={filters.status} onChange={e => setFilters({...filters, status: e.target.value})}>
                        <option value="All">All Status</option><option>Effective</option><option>Draft</option><option>Obsolete</option>
                      </select>
                    </div>
                  </div>
                </div>

                {/* --- BẢNG DỮ LIỆU (DATA TABLE) --- */}
                <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 table-shadow overflow-hidden flex flex-col transition-colors duration-200">
                  <div className="overflow-x-auto">
                    <table className="min-w-full divide-y divide-slate-200 dark:divide-slate-700">
                      <thead className="bg-slate-50 dark:bg-slate-900/50">
                        <tr>
                          <th scope="col" className="px-6 py-3.5 text-left text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Doc Code</th>
                          <th scope="col" className="px-6 py-3.5 text-left text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider min-w-[280px]">Document Title</th>
                          <th scope="col" className="px-6 py-3.5 text-center text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Type / Scope</th>
                          <th scope="col" className="px-6 py-3.5 text-left text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Department</th>
                          <th scope="col" className="px-6 py-3.5 text-center text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Ver</th>
                          <th scope="col" className="px-6 py-3.5 text-left text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Review Due</th>
                          <th scope="col" className="px-6 py-3.5 text-center text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Status</th>
                          <th scope="col" className="px-6 py-3.5 text-right text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider print:hidden">Actions</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-200 dark:divide-slate-700 bg-white dark:bg-slate-800">
                        {currentSops.length > 0 ? currentSops.map(sop => {
                            const isDue = sop.reviewDate && Math.ceil((new Date(sop.reviewDate) - new Date()) / (1000 * 60 * 60 * 24)) <= 30;
                            return (
                              <tr key={sop.id} className="hover:bg-slate-50/80 dark:hover:bg-slate-700/50 transition-colors group">
                                <td className="px-6 py-4 whitespace-nowrap">
                                  <div className="font-bold text-brand-700 dark:text-brand-400">{sop.code}</div>
                                </td>
                                <td className="px-6 py-4">
                                  <div className="font-semibold text-slate-900 dark:text-slate-100 leading-tight">{sop.name}</div>
                                  <div className="text-xs text-slate-500 dark:text-slate-400 mt-1 truncate max-w-sm"><i className="fa-regular fa-clock mr-1"></i> Hiệu lực: {sop.effectiveDate || 'Chưa định'}</div>
                                </td>
                                <td className="px-6 py-4 text-center whitespace-nowrap">
                                  <div className="flex flex-col items-center gap-1.5">
                                    <Badge type="Type">{sop.type}</Badge>
                                    <Badge type={sop.scope}>{sop.scope}</Badge>
                                  </div>
                                </td>
                                <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-600 dark:text-slate-300">
                                  {sop.dept}
                                </td>
                                <td className="px-6 py-4 whitespace-nowrap text-center">
                                  <span className="inline-flex items-center justify-center w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 font-bold text-sm border border-slate-200 dark:border-slate-600">
                                    {sop.version}
                                  </span>
                                </td>
                                <td className={`px-6 py-4 whitespace-nowrap text-sm ${getReviewStatusColor(sop.reviewDate)}`}>
                                  {isDue && <i className="fa-solid fa-circle-exclamation mr-1"></i>}
                                  {sop.reviewDate || '-'}
                                </td>
                                <td className="px-6 py-4 whitespace-nowrap text-center">
                                  <Badge type={sop.status}>{sop.status}</Badge>
                                </td>
                                <td className="px-6 py-4 whitespace-nowrap text-right print:hidden">
                                  <div className="flex justify-end gap-1 opacity-100 lg:opacity-20 lg:group-hover:opacity-100 transition-opacity">
                                    <button onClick={() => openPreviewModal(sop)} className="p-2 text-slate-400 dark:text-slate-500 hover:text-brand-600 dark:hover:text-brand-400 hover:bg-brand-50 dark:hover:bg-brand-900/30 rounded-lg transition-colors" title="Xem trước (Preview)">
                                      <i className="fa-solid fa-eye text-lg"></i>
                                    </button>
                                    <button onClick={() => { setHistoryCode(sop.code); setIsHistoryModalOpen(true); }} className="p-2 text-slate-400 dark:text-slate-500 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 rounded-lg transition-colors" title="Lịch sử (History)">
                                      <i className="fa-solid fa-clock-rotate-left text-lg"></i>
                                    </button>
                                    
                                    {/* CHỈ HIỂN THỊ CÁC NÚT SAU KHI LÀ ADMIN */}
                                    {isAdmin && (
                                        <>
                                            <button onClick={() => openEditModal(sop)} className="p-2 text-slate-400 dark:text-slate-500 hover:text-emerald-600 dark:hover:text-emerald-400 hover:bg-emerald-50 dark:hover:bg-emerald-900/30 rounded-lg transition-colors" title="Sửa (Edit)">
                                              <i className="fa-solid fa-pen text-lg"></i>
                                            </button>
                                            <button onClick={() => openReviseModal(sop)} className="p-2 text-slate-400 dark:text-slate-500 hover:text-purple-600 dark:hover:text-purple-400 hover:bg-purple-50 dark:hover:bg-purple-900/30 rounded-lg transition-colors" title="Soát xét (Revise)">
                                              <i className="fa-solid fa-code-branch text-lg"></i>
                                            </button>
                                        </>
                                    )}
                                  </div>
                                </td>
                              </tr>
                            )
                        }) : (
                          <tr>
                            <td colSpan="8" className="px-6 py-16 text-center">
                              <div className="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500">
                                <i className="fa-regular fa-folder-open text-5xl mb-4 text-slate-300 dark:text-slate-600"></i>
                                <p className="text-lg font-medium text-slate-600 dark:text-slate-400">Không tìm thấy tài liệu nào</p>
                                <p className="text-sm mt-1">Vui lòng điều chỉnh bộ lọc hoặc thêm tài liệu mới.</p>
                                {sops.length === 0 && isAdmin && (
                                  <button onClick={seedInitialData} className="mt-6 px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg text-sm font-semibold text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors shadow-sm">
                                    <i className="fa-solid fa-wand-magic-sparkles mr-2 text-amber-500"></i>Khôi phục dữ liệu mẫu
                                  </button>
                                )}
                              </div>
                            </td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                  </div>

                  {/* --- PAGINATION --- */}
                  <div className="bg-slate-50 dark:bg-slate-900/50 px-6 py-3 border-t border-slate-200 dark:border-slate-700 flex items-center justify-between sm:px-6 print:hidden">
                    <div className="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
                      <div>
                        <p className="text-sm text-slate-700 dark:text-slate-300">
                          Hiển thị <span className="font-semibold text-slate-900 dark:text-white">{filteredSops.length === 0 ? 0 : indexOfFirstItem + 1}</span> đến <span className="font-semibold text-slate-900 dark:text-white">{Math.min(indexOfLastItem, filteredSops.length)}</span> của <span className="font-semibold text-slate-900 dark:text-white">{filteredSops.length}</span> kết quả
                        </p>
                      </div>
                      {totalPages > 1 && (
                        <div>
                          <nav className="relative z-0 inline-flex rounded-md shadow-sm -space-x-px" aria-label="Pagination">
                            <button onClick={() => setCurrentPage(prev => Math.max(prev - 1, 1))} disabled={currentPage === 1} className="relative inline-flex items-center px-2 py-2 rounded-l-md border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-sm font-medium text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700 disabled:opacity-50">
                              <i className="fa-solid fa-chevron-left"></i>
                            </button>
                            {[...Array(totalPages)].map((_, i) => (
                               <button key={i} onClick={() => setCurrentPage(i + 1)} className={`relative inline-flex items-center px-4 py-2 border text-sm font-medium ${currentPage === i + 1 ? 'z-10 bg-brand-50 dark:bg-brand-900/50 border-brand-500 text-brand-600 dark:text-brand-400' : 'bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700'}`}>
                                 {i + 1}
                               </button>
                            ))}
                            <button onClick={() => setCurrentPage(prev => Math.min(prev + 1, totalPages))} disabled={currentPage === totalPages} className="relative inline-flex items-center px-2 py-2 rounded-r-md border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-sm font-medium text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700 disabled:opacity-50">
                              <i className="fa-solid fa-chevron-right"></i>
                            </button>
                          </nav>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </main>

              {/* --- LOGIN MODAL --- */}
              {showLoginModal && (
                <div className="fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
                  <div className="flex items-center justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:p-0">
                    <div className="fixed inset-0 bg-slate-900/50 dark:bg-slate-900/80 backdrop-blur-sm transition-opacity" aria-hidden="true" onClick={() => setShowLoginModal(false)}></div>
                    <div className="inline-block align-bottom bg-white dark:bg-slate-800 rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-md sm:w-full animate-modal border border-slate-200 dark:border-slate-700">
                        <div className="bg-slate-50 dark:bg-slate-900/50 px-6 py-4 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between">
                            <h3 className="text-lg leading-6 font-bold text-slate-900 dark:text-white flex items-center gap-2">
                                <div className="w-8 h-8 rounded-lg bg-brand-100 dark:bg-brand-900/30 flex items-center justify-center text-brand-600 dark:text-brand-400"><i className="fa-solid fa-shield-halved"></i></div>
                                Đăng nhập Quản trị
                            </h3>
                            <button onClick={() => setShowLoginModal(false)} className="bg-transparent text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 focus:outline-none rounded-md p-1 transition-colors"><i className="fa-solid fa-xmark text-xl"></i></button>
                        </div>
                        <div className="px-6 py-5">
                            {loginError && (
                                <div className="mb-4 bg-rose-50 dark:bg-rose-900/30 border-l-4 border-rose-500 p-3 rounded-r-md">
                                    <p className="text-sm text-rose-700 dark:text-rose-300">{loginError}</p>
                                </div>
                            )}
                            <form id="loginForm" onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1">Email <span className="text-rose-500">*</span></label>
                                    <input required type="email" value={loginEmail} onChange={e => setLoginEmail(e.target.value)} className="block w-full rounded-lg border-0 py-2.5 px-3 text-slate-900 dark:text-white bg-white dark:bg-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 dark:ring-slate-600 focus:ring-2 focus:ring-inset focus:ring-brand-600 sm:text-sm" placeholder="admin@domain.com"/>
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1">Mật khẩu <span className="text-rose-500">*</span></label>
                                    <input required type="password" value={loginPassword} onChange={e => setLoginPassword(e.target.value)} className="block w-full rounded-lg border-0 py-2.5 px-3 text-slate-900 dark:text-white bg-white dark:bg-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 dark:ring-slate-600 focus:ring-2 focus:ring-inset focus:ring-brand-600 sm:text-sm" placeholder="••••••••"/>
                                </div>
                            </form>
                        </div>
                        <div className="bg-slate-50 dark:bg-slate-900/50 px-6 py-4 border-t border-slate-200 dark:border-slate-700 flex justify-end gap-3">
                            <button type="button" onClick={() => setShowLoginModal(false)} className="inline-flex justify-center rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-4 py-2 text-sm font-semibold text-slate-700 dark:text-slate-300 shadow-sm hover:bg-slate-50 dark:hover:bg-slate-700 focus:outline-none transition-colors">Hủy</button>
                            <button form="loginForm" type="submit" className="inline-flex justify-center rounded-lg border border-transparent bg-brand-600 px-6 py-2 text-sm font-semibold text-white shadow-sm hover:bg-brand-700 focus:outline-none transition-colors">
                                Đăng nhập
                            </button>
                        </div>
                    </div>
                  </div>
                </div>
              )}

              {/* --- ADD/EDIT MODAL --- */}
              {isModalOpen && (
                <div className="fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
                  <div className="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
                    <div className="fixed inset-0 bg-slate-900/50 dark:bg-slate-900/80 backdrop-blur-sm transition-opacity" aria-hidden="true" onClick={() => setIsModalOpen(false)}></div>
                    <span className="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
                    
                    <div className="inline-block align-bottom bg-white dark:bg-slate-800 rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-3xl sm:w-full animate-modal border border-slate-200 dark:border-slate-700">
                      <div className="bg-slate-50 dark:bg-slate-900/50 px-6 py-4 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between">
                        <h3 className="text-lg leading-6 font-bold text-slate-900 dark:text-white" id="modal-title">
                          {modalMode === 'add' ? 'Thêm Tài liệu Mới' : modalMode === 'revise' ? 'Soát xét Phiên bản Mới' : 'Cập nhật Thông tin'}
                        </h3>
                        <button onClick={() => setIsModalOpen(false)} className="bg-transparent text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 focus:outline-none rounded-md p-1 transition-colors"><i className="fa-solid fa-xmark text-xl"></i></button>
                      </div>
                      
                      <div className="px-6 py-5">
                        {formError && (
                          <div className="mb-5 bg-rose-50 dark:bg-rose-900/30 border-l-4 border-rose-500 p-4 rounded-r-md">
                            <div className="flex items-center">
                              <div className="flex-shrink-0"><i className="fa-solid fa-circle-exclamation text-rose-500 dark:text-rose-400"></i></div>
                              <div className="ml-3"><p className="text-sm text-rose-700 dark:text-rose-300 font-medium">{formError}</p></div>
                            </div>
                          </div>
                        )}
                        
                        <form id="sopForm" onSubmit={handleSaveSOP} className="space-y-5">
                          <div className="grid grid-cols-4 gap-4">
                            <div className="col-span-3">
                              <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1">Mã tài liệu (Doc Code) <span className="text-rose-500">*</span></label>
                              <input required type="text" value={formData.code} onChange={e => setFormData({...formData, code: e.target.value.toUpperCase()})} readOnly={modalMode !== 'add'} className={`block w-full rounded-lg border-slate-300 dark:border-slate-600 px-3 py-2 sm:text-sm focus:ring-brand-500 focus:border-brand-500 shadow-sm ring-1 ring-inset ${modalMode !== 'add' ? 'bg-slate-100 dark:bg-slate-700 ring-slate-200 dark:ring-slate-600 text-slate-500 dark:text-slate-400 cursor-not-allowed' : 'ring-slate-300 dark:ring-slate-600 bg-white dark:bg-slate-900 text-slate-900 dark:text-white'}`} placeholder="VD: SOP-QA-001"/>
                            </div>
                            <div className="col-span-1">
                              <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1">Version <span className="text-rose-500">*</span></label>
                              <input required type="text" value={formData.version} onChange={e => setFormData({...formData, version: e.target.value})} className="block w-full rounded-lg border-transparent px-3 py-2 text-center font-bold text-brand-700 dark:text-brand-400 bg-brand-50 dark:bg-brand-900/30 shadow-sm ring-1 ring-inset ring-brand-200 dark:ring-brand-500/30 focus:ring-2 focus:ring-inset focus:ring-brand-600 sm:text-sm"/>
                            </div>
                          </div>
                          
                          <div>
                            <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1">Tên tài liệu (Title) <span className="text-rose-500">*</span></label>
                            <input required type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="block w-full rounded-lg border-0 py-2 px-3 text-slate-900 dark:text-white bg-white dark:bg-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 dark:ring-slate-600 placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:ring-2 focus:ring-inset focus:ring-brand-600 sm:text-sm" placeholder="Tên quy trình / hướng dẫn..."/>
                          </div>

                          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                            <div>
                              <label className="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">Loại</label>
                              <select value={formData.type} onChange={e => setFormData({...formData, type: e.target.value})} className="block w-full rounded-md border-0 py-2 pl-3 pr-10 text-slate-900 dark:text-white bg-white dark:bg-slate-800 ring-1 ring-inset ring-slate-300 dark:ring-slate-600 focus:ring-2 focus:ring-brand-600 sm:text-sm sm:leading-6">
                                <option>SOP</option><option>WI</option><option>FORM</option><option>POLICY</option>
                              </select>
                            </div>
                            <div>
                              <label className="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">Phạm vi</label>
                              <select value={formData.scope} onChange={e => setFormData({...formData, scope: e.target.value})} className="block w-full rounded-md border-0 py-2 pl-3 pr-10 text-slate-900 dark:text-white bg-white dark:bg-slate-800 ring-1 ring-inset ring-slate-300 dark:ring-slate-600 focus:ring-2 focus:ring-brand-600 sm:text-sm sm:leading-6">
                                <option>GMP</option><option>GDP</option><option>GSP</option><option>GMP+GSP+GDP</option>
                              </select>
                            </div>
                            <div>
                              <label className="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">Bộ phận</label>
                              <select value={formData.dept} onChange={e => setFormData({...formData, dept: e.target.value})} className="block w-full rounded-md border-0 py-2 pl-3 pr-10 text-slate-900 dark:text-white bg-white dark:bg-slate-800 ring-1 ring-inset ring-slate-300 dark:ring-slate-600 focus:ring-2 focus:ring-brand-600 sm:text-sm sm:leading-6">
                                <option>QA</option><option>QC</option><option>Warehouse</option><option>Logistics</option><option>Production</option>
                              </select>
                            </div>
                          </div>

                          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                              <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1">Trạng thái</label>
                              <select value={formData.status} onChange={e => setFormData({...formData, status: e.target.value})} className={`block w-full rounded-lg border-0 py-2 pl-3 pr-10 font-medium shadow-sm ring-1 ring-inset focus:ring-2 sm:text-sm ${formData.status === 'Effective' ? 'bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 ring-emerald-200 dark:ring-emerald-500/30 focus:ring-emerald-600' : formData.status === 'Draft' ? 'bg-amber-50 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400 ring-amber-200 dark:ring-amber-500/30 focus:ring-amber-600' : 'bg-slate-50 dark:bg-slate-800 text-slate-600 dark:text-slate-400 ring-slate-300 dark:ring-slate-600 focus:ring-slate-600'}`}>
                                <option value="Draft">Draft (Bản nháp)</option>
                                <option value="Effective">Effective (Hiệu lực)</option>
                                <option value="Obsolete">Obsolete (Hết hạn)</option>
                              </select>
                            </div>
                            <div>
                              <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1">Ngày hiệu lực</label>
                              <input type="date" value={formData.effectiveDate} onChange={e => setFormData({...formData, effectiveDate: e.target.value})} className="block w-full rounded-lg border-0 py-2 px-3 text-slate-900 dark:text-white bg-white dark:bg-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 dark:ring-slate-600 focus:ring-2 focus:ring-inset focus:ring-brand-600 sm:text-sm"/>
                            </div>
                            <div>
                              <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1">Hạn soát xét</label>
                              <input type="date" value={formData.reviewDate} onChange={e => setFormData({...formData, reviewDate: e.target.value})} className="block w-full rounded-lg border-0 py-2 px-3 text-slate-900 dark:text-white bg-white dark:bg-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 dark:ring-slate-600 focus:ring-2 focus:ring-inset focus:ring-brand-600 sm:text-sm"/>
                            </div>
                          </div>

                          <div>
                            <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1">Nội dung sửa đổi / Ghi chú</label>
                            <textarea rows="2" value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} className="block w-full rounded-lg border-0 py-2 px-3 text-slate-900 dark:text-white bg-white dark:bg-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 dark:ring-slate-600 placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:ring-2 focus:ring-inset focus:ring-brand-600 sm:text-sm resize-none" placeholder="Lý do soát xét, nội dung thay đổi chính..."></textarea>
                          </div>

                          {/* Khu vực Upload / Gắn link */}
                          <div className="bg-slate-50 dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                            <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Đính kèm tài liệu (PDF ưu tiên cho Preview)</label>
                            <div className="flex flex-col md:flex-row gap-3 items-start md:items-center">
                              <div className="w-full md:flex-1">
                                <div className="relative rounded-md shadow-sm">
                                  <div className="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                                    <i className="fa-solid fa-link text-slate-400 dark:text-slate-500"></i>
                                  </div>
                                  <input type="url" value={formData.link} onChange={e => setFormData({...formData, link: e.target.value})} className="block w-full rounded-lg border-0 py-2.5 pl-10 px-3 text-slate-900 dark:text-white bg-white dark:bg-slate-800 ring-1 ring-inset ring-slate-300 dark:ring-slate-600 placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:ring-2 focus:ring-inset focus:ring-brand-600 sm:text-sm" placeholder="Nhập link Google Drive... HOẶC bấm nút Tải file bên cạnh"/>
                                </div>
                              </div>
                              <div className="w-full md:w-auto shrink-0 flex items-center justify-center">
                                <label className={`cursor-pointer w-full md:w-auto text-center bg-slate-200 hover:bg-slate-300 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 px-4 py-2.5 rounded-lg text-sm font-semibold border border-slate-300 dark:border-slate-600 transition-colors ${uploading ? 'opacity-70 cursor-not-allowed' : ''}`}>
                                  {uploading ? (
                                      <><i className="fa-solid fa-spinner fa-spin mr-2"></i>Đang tải...</>
                                  ) : (
                                      <><i className="fa-solid fa-cloud-arrow-up mr-2"></i>Tải file lên</>
                                  )}
                                  <input type="file" className="hidden" accept=".pdf,.doc,.docx,.xls,.xlsx" onChange={handleFileUpload} disabled={uploading} key={fileInputKey}/>
                                </label>
                              </div>
                            </div>
                            
                            {/* Thanh tiến trình upload */}
                            {uploading && (
                              <div className="w-full bg-slate-200 dark:bg-slate-800 rounded-full h-2 mt-3 overflow-hidden">
                                <div className="bg-brand-600 h-2 rounded-full transition-all duration-300" style={{ width: `${uploadProgress}%` }}></div>
                              </div>
                            )}
                          </div>

                        </form>
                      </div>
                      
                      <div className="bg-slate-50 dark:bg-slate-900/50 px-6 py-4 border-t border-slate-200 dark:border-slate-700 flex justify-end gap-3 rounded-b-2xl">
                        <button type="button" onClick={() => setIsModalOpen(false)} className="inline-flex justify-center rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-4 py-2 text-sm font-semibold text-slate-700 dark:text-slate-300 shadow-sm hover:bg-slate-50 dark:hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2 dark:focus:ring-offset-slate-800 transition-colors">Hủy bỏ</button>
                        <button form="sopForm" type="submit" disabled={uploading} className={`inline-flex justify-center rounded-lg border border-transparent bg-brand-600 px-6 py-2 text-sm font-semibold text-white shadow-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2 dark:focus:ring-offset-slate-800 transition-colors ${uploading ? 'opacity-50 cursor-not-allowed' : 'hover:bg-brand-700'}`}>
                          <i className="fa-solid fa-floppy-disk mr-2 mt-0.5"></i> {modalMode === 'add' ? 'Lưu Dữ Liệu' : 'Cập Nhật'}
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* --- PREVIEW MODAL (Document Viewer) --- */}
              {isPreviewModalOpen && previewData && (
                <div className="fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
                  <div className="flex items-center justify-center min-h-screen pt-4 px-4 text-center sm:p-0">
                    <div className="fixed inset-0 bg-slate-900/70 dark:bg-slate-900/90 backdrop-blur-sm transition-opacity" aria-hidden="true" onClick={() => setIsPreviewModalOpen(false)}></div>
                    
                    <div className="inline-block align-bottom bg-white dark:bg-slate-800 rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle w-full max-w-6xl h-[90vh] flex flex-col animate-modal border border-slate-200 dark:border-slate-700">
                      
                      <div className="bg-white dark:bg-slate-800 px-6 py-4 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center shrink-0">
                        <div className="flex items-center gap-4">
                          <div className="bg-brand-50 dark:bg-brand-900/30 text-brand-600 dark:text-brand-400 p-2.5 rounded-xl border border-brand-100 dark:border-brand-800/50"><i className="fa-solid fa-file-pdf text-xl"></i></div>
                          <div>
                            <h2 className="text-xl font-bold text-slate-900 dark:text-white">{previewData.code} <span className="text-sm font-normal text-slate-500 dark:text-slate-400 ml-2">Phiên bản: <strong className="text-brand-600 dark:text-brand-400">v{previewData.version}</strong></span></h2>
                            <p className="text-sm font-medium text-slate-600 dark:text-slate-300">{previewData.name}</p>
                          </div>
                        </div>
                        <div className="flex items-center gap-3">
                          {previewData.link && (
                            <a href={previewData.link} target="_blank" rel="noreferrer" className="inline-flex items-center px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg shadow-sm text-sm font-semibold text-slate-700 dark:text-slate-200 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-500 transition-colors">
                              <i className="fa-solid fa-arrow-up-right-from-square mr-2 text-slate-400 dark:text-slate-500"></i> Mở cửa sổ mới
                            </a>
                          )}
                          <button onClick={() => setIsPreviewModalOpen(false)} className="bg-slate-100 dark:bg-slate-700 p-2 rounded-lg text-slate-500 dark:text-slate-300 hover:text-slate-800 dark:hover:text-white hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors focus:outline-none"><i className="fa-solid fa-xmark text-xl"></i></button>
                        </div>
                      </div>

                      <div className="flex-1 flex flex-col md:flex-row overflow-hidden bg-slate-50 dark:bg-slate-900/50">
                        <div className="w-full md:w-[320px] bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 overflow-y-auto shrink-0 p-6 flex flex-col gap-6">
                          <div>
                            <h4 className="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-3">Thuộc tính tài liệu</h4>
                            <div className="space-y-4">
                              <div className="flex justify-between items-center border-b border-slate-100 dark:border-slate-700 pb-2">
                                <span className="text-sm text-slate-500 dark:text-slate-400">Phân loại</span>
                                <Badge type="Type">{previewData.type}</Badge>
                              </div>
                              <div className="flex justify-between items-center border-b border-slate-100 dark:border-slate-700 pb-2">
                                <span className="text-sm text-slate-500 dark:text-slate-400">Phòng ban</span>
                                <span className="text-sm font-semibold text-slate-800 dark:text-slate-200">{previewData.dept}</span>
                              </div>
                              <div className="flex justify-between items-center border-b border-slate-100 dark:border-slate-700 pb-2">
                                <span className="text-sm text-slate-500 dark:text-slate-400">Tiêu chuẩn</span>
                                <Badge type={previewData.scope}>{previewData.scope}</Badge>
                              </div>
                              <div className="flex justify-between items-center">
                                <span className="text-sm text-slate-500 dark:text-slate-400">Trạng thái</span>
                                <Badge type={previewData.status}>{previewData.status}</Badge>
                              </div>
                            </div>
                          </div>

                          <div className="bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700 space-y-3">
                            <div>
                              <div className="text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1"><i className="fa-regular fa-calendar-check mr-1.5"></i> Ngày hiệu lực</div>
                              <div className="text-sm font-bold text-slate-800 dark:text-slate-200">{previewData.effectiveDate || 'Chưa ban hành'}</div>
                            </div>
                            <div>
                              <div className="text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1"><i className="fa-solid fa-calendar-day mr-1.5"></i> Hạn soát xét</div>
                              <div className="text-sm font-bold text-slate-800 dark:text-slate-200">{previewData.reviewDate || 'Chưa xác định'}</div>
                            </div>
                          </div>

                          <div>
                            <h4 className="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2">Ghi chú lịch sử</h4>
                            <div className="bg-amber-50 dark:bg-amber-900/20 p-3 rounded-lg border border-amber-200 dark:border-amber-800/50 text-sm text-amber-800 dark:text-amber-400 leading-relaxed italic">
                              {previewData.notes || 'Không có mô tả thay đổi.'}
                            </div>
                          </div>
                        </div>

                        <div className="flex-1 p-4 relative flex flex-col items-center justify-center">
                          {previewData.link ? (
                            <>
                              <iframe src={getEmbedLink(previewData.link)} className="w-full h-full rounded-xl shadow-sm border border-slate-300 dark:border-slate-600 bg-white" title="Viewer" allowFullScreen></iframe>
                              {isGoogleDriveLink(previewData.link) && (
                                <div className="mt-3 w-full bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 p-3 rounded-lg text-sm flex items-start gap-3 border border-blue-200 dark:border-blue-800/50">
                                  <i className="fa-solid fa-circle-info mt-0.5"></i>
                                  <p>Lưu ý: Nếu bạn thấy thông báo <strong>"Bạn cần có quyền truy cập"</strong> từ Google Drive, đó là do trình duyệt đang chặn cookie. Hãy bấm <strong>"Mở cửa sổ mới"</strong> ở góc trên hoặc dùng tính năng <strong>Upload File</strong> trực tiếp thay vì link Drive để xem liền mạch hơn.</p>
                                </div>
                              )}
                            </>
                          ) : (
                            <div className="text-center bg-white dark:bg-slate-800 p-12 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 max-w-md">
                              <i className="fa-solid fa-link-slash text-5xl text-slate-300 dark:text-slate-600 mb-4"></i>
                              <h3 className="text-lg font-bold text-slate-800 dark:text-white mb-2">Chưa đính kèm file gốc</h3>
                              <p className="text-sm text-slate-500 dark:text-slate-400 mb-6">Tài liệu này chưa có đường dẫn hoặc file upload để hiển thị trực tiếp.</p>
                              {isAdmin && (
                                <button onClick={() => { setIsPreviewModalOpen(false); openEditModal(previewData); }} className="inline-flex items-center px-4 py-2 border border-transparent text-sm font-semibold rounded-lg text-brand-700 dark:text-brand-400 bg-brand-100 dark:bg-brand-900/40 hover:bg-brand-200 dark:hover:bg-brand-900/60 transition-colors">
                                  Cập nhật liên kết / Tải file ngay
                                </button>
                              )}
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* --- HISTORY MODAL --- */}
              {isHistoryModalOpen && (
                <div className="fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
                  <div className="flex items-center justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:p-0">
                    <div className="fixed inset-0 bg-slate-900/60 dark:bg-slate-900/80 backdrop-blur-sm transition-opacity" aria-hidden="true" onClick={() => setIsHistoryModalOpen(false)}></div>
                    <div className="inline-block align-bottom bg-white dark:bg-slate-800 rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-4xl sm:w-full animate-modal border border-slate-200 dark:border-slate-700">
                      <div className="bg-slate-50 dark:bg-slate-900/50 px-6 py-4 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center">
                        <h3 className="text-lg font-bold text-slate-900 dark:text-white flex items-center gap-2">
                          <i className="fa-solid fa-clock-rotate-left text-brand-600 dark:text-brand-400"></i> Lịch sử sửa đổi: {historyCode}
                        </h3>
                        <button onClick={() => setIsHistoryModalOpen(false)} className="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors"><i className="fa-solid fa-xmark text-xl"></i></button>
                      </div>
                      
                      <div className="max-h-[60vh] overflow-y-auto p-0">
                        <table className="min-w-full divide-y divide-slate-200 dark:divide-slate-700">
                          <thead className="bg-white dark:bg-slate-800 sticky top-0 shadow-sm z-10">
                            <tr>
                              <th className="px-6 py-3 text-left text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider bg-white dark:bg-slate-800">Ver</th>
                              <th className="px-6 py-3 text-left text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider bg-white dark:bg-slate-800">Trạng thái</th>
                              <th className="px-6 py-3 text-left text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider bg-white dark:bg-slate-800">Ngày HL</th>
                              <th className="px-6 py-3 text-left text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider bg-white dark:bg-slate-800">Nội dung</th>
                              <th className="px-6 py-3 text-right text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider bg-white dark:bg-slate-800">Quản trị</th>
                            </tr>
                          </thead>
                          <tbody className="bg-white dark:bg-slate-800 divide-y divide-slate-100 dark:divide-slate-700/50">
                            {sops.filter(s => s.code === historyCode).sort((a,b) => parseFloat(b.version) - parseFloat(a.version)).map((ver) => (
                              <tr key={ver.id} className="hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
                                <td className="px-6 py-4 whitespace-nowrap font-bold text-brand-700 dark:text-brand-400">v{ver.version}</td>
                                <td className="px-6 py-4 whitespace-nowrap"><Badge type={ver.status}>{ver.status}</Badge></td>
                                <td className="px-6 py-4 whitespace-nowrap text-sm text-slate-600 dark:text-slate-300">{ver.effectiveDate || '-'}</td>
                                <td className="px-6 py-4 text-sm text-slate-600 dark:text-slate-300 italic max-w-xs truncate">{ver.notes || '-'}</td>
                                <td className="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                    {isAdmin ? (
                                        <>
                                           <button onClick={() => { setIsHistoryModalOpen(false); openEditModal(ver); }} className="text-brand-600 dark:text-brand-400 hover:text-brand-900 dark:hover:text-brand-300 mr-4">Sửa</button>
                                           <button onClick={() => deleteSOP(ver.id)} className="text-rose-600 dark:text-rose-400 hover:text-rose-900 dark:hover:text-rose-300">Xóa</button>
                                        </>
                                    ) : (
                                        <span className="text-slate-400 dark:text-slate-500 italic text-xs">Chỉ xem</span>
                                    )}
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                      <div className="bg-slate-50 dark:bg-slate-900/50 px-6 py-4 border-t border-slate-200 dark:border-slate-700 flex justify-end">
                        <button onClick={() => setIsHistoryModalOpen(false)} className="px-5 py-2 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300 rounded-lg text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-brand-500 dark:focus:ring-brand-400 focus:ring-offset-2 dark:focus:ring-offset-slate-900">Đóng cửa sổ</button>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
